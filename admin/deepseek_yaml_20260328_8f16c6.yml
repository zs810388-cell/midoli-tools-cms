backend:
  name: github
  repo: zs810388-cell/midoli-tools-cms    # 🔴 改成你的 GitHub 用户名/仓库名
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "产品管理"
    label_singular: "产品"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "产品名称", name: "title", widget: "string" }
      - { label: "价格", name: "price", widget: "string", required: false, default: "По запросу" }
      - { label: "规格列表", name: "specs", widget: "list", required: false, field: { label: "规格", name: "spec", widget: "string" } }
      - { label: "排序权重", name: "order", widget: "number", default: 0, required: false }

  - name: "settings"
    label: "网站设置"
    files:
      - name: "general"
        label: "通用信息"
        file: "content/settings.json"
        fields:
          - { label: "公司全称", name: "company_name", widget: "string", default: "浙江镁多力工具有限公司" }
          - { label: "联系电话", name: "phone", widget: "string", required: false }
          - { label: "联系邮箱", name: "email", widget: "string", required: false }
          - { label: "莫斯科仓库地址", name: "warehouse", widget: "text", required: false }